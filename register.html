<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Institucional</title>
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="main-wrapper">
    <div class="contenedor-registro">
        <div class="encabezado-formulario">
            <h2>Formulario de Registro</h2>
            <p>Por favor, complete los datos a continuación para crear su cuenta institucional.</p>
        </div>

        <form action="#" method="post">
            
            <div class="grupo-input">
                <label for="nombre">Nombre</label>
                <div class="input-icono">
                    <i class="fas fa-user"></i>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan" required>
                </div>
            </div>

            <div class="grupo-input">
                <label for="apellido">Apellido</label>
                <div class="input-icono">
                    <i class="fas fa-user-tag"></i>
                    <input type="text" id="apellido" name="apellido" placeholder="Ej. Pérez" required>
                </div>
            </div>

            <div class="grupo-input">
                <label for="tipo-usuario">Tipo de Usuario</label>
                <div class="input-icono">
                    <i class="fas fa-id-card"></i>
                    <select id="tipo-usuario" name="tipo_usuario" required>
                        <option value="" disabled selected>Seleccione su rol</option>
                        <option value="alumno">Alumno</option>
                        <option value="profesor">Profesor</option>
                        <option value="administrativo">Personal Administrativo</option>
                    </select>
                </div>
            </div>

            <div class="grupo-input">
                <label for="email">Correo Electrónico Institucional</label>
                <div class="input-icono">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="juan.perez@institucion.edu" required>
                </div>
            </div>

            <div class="terminos">
                <input type="checkbox" id="terminos" required>
                <label for="terminos">Acepto los términos y condiciones de privacidad.</label>
            </div>

            <button type="submit" class="btn-registrar">Crear Cuenta</button>
            
            <div class="pie-formulario">
                <p>¿Ya tienes cuenta? <a href="#">Inicia sesión aquí</a></p>
            </div>
        </form>
    </div>
</div>

</body>
</html>
